<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEYDEN — Plateforme 360°</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,102,0,0.18), transparent 22%),
        linear-gradient(180deg, #06060a 0%, #111118 100%);
      color: white;
    }

    .container {
      width: min(1200px, 92%);
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(8, 8, 12, 0.85);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 18px 0;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* 🔥 LOGO FIX */
    .logo-img {
      width: 54px;
      height: 54px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(255,102,0,0.35);
      display: block;
    }

    .brand h1 {
      margin: 0;
      color: #ff6600;
      letter-spacing: 0.18em;
      font-size: 28px;
    }

    .brand small {
      display: block;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-top: 3px;
      font-size: 11px;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav button {
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      cursor: pointer;
    }

    .hero {
      padding: 36px 0;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 900;
    }

    .hero-title span {
      color: #ff6600;
    }

    .btn {
      padding: 14px 20px;
      background: #ff6600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="topbar">
    <div class="container topbar-inner">

      <div class="brand">
        <img src="./logo.png" alt="Meyden logo" class="logo-img" />
        <div>
          <h1>MEYDEN</h1>
          <small>MOUVEMENT ARTISTIQUE DU QUÉBEC</small>
        </div>
      </div>

      <div class="nav">
        <button onclick="document.getElementById('decouvrir').scrollIntoView()">Découvrir</button>
        <button onclick="document.getElementById('bibliotheque').scrollIntoView()">Bibliothèque</button>
        <button onclick="document.getElementById('boutique').scrollIntoView()">Boutique</button>
        <button onclick="document.getElementById('entreprises').scrollIntoView()">Entreprises</button>
        <button onclick="document.getElementById('abonnements').scrollIntoView()">Abonnements</button>
      </div>

    </div>
  </div>

  <!-- HERO -->
  <div class="container hero">

    <div class="hero-title">
      Fais entrer ton <span>mouvement</span><br>
      dans une vraie machine visuelle.
    </div>

    <p>
      MEYDEN n’est pas juste une page. C’est une vitrine immersive pour découvrir, diffuser, connecter et monétiser les artistes du Québec.
    </p>

    <br>

    <button class="btn">Entrer dans Meyden</button>

  </div>

</body>
</html>
