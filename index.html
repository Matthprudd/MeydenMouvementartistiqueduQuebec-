<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meyden Monitor 8.5</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">

<div class="max-w-7xl mx-auto">

  <h1 class="text-3xl font-bold mb-2">Meyden Monitor — Version 8.5 UI complète</h1>
  <p class="text-white/60 mb-8">Diffusion, abonnements, Meyden Coins et évolution du contenu.</p>

  <!-- TOP INFO -->
  <div class="grid md:grid-cols-3 gap-6 mb-8">

    <div class="bg-white/5 p-6 rounded-xl">
      <div class="text-white/50">Monitor actif</div>
      <div id="monitorName" class="text-xl font-bold text-orange-400 mt-2">International</div>
    </div>

    <div class="bg-white/5 p-6 rounded-xl">
      <div class="text-white/50">Meyden Coins</div>
      <div id="coins" class="text-2xl font-bold text-yellow-400 mt-2">148</div>
    </div>

    <div class="bg-white/5 p-6 rounded-xl">
      <div class="text-white/50">Tuned On</div>
      <div id="tuned" class="text-2xl font-bold text-green-400 mt-2">1200</div>
    </div>

  </div>

  <!-- MONITORS -->
  <div class="mb-8">
    <h2 class="text-xl mb-4">Les 5 Meyden Monitors</h2>
    <div id="monitors" class="grid md:grid-cols-3 gap-3"></div>
  </div>

  <!-- PLAYER -->
  <div class="bg-white/5 p-6 rounded-xl mb-8">

    <div class="text-white/50">Now Playing</div>
    <div id="version" class="text-xl">Clip V1</div>

    <div class="grid grid-cols-2 mt-4">
      <div>
        <div class="text-white/50">Score</div>
        <div id="score" class="text-2xl font-bold text-green-400">72</div>
      </div>
      <div>
        <div class="text-white/50">Coins gagnés</div>
        <div id="coins2" class="text-2xl font-bold text-yellow-400">148</div>
      </div>
    </div>

  </div>

  <!-- FLOW -->
  <div id="flow" class="grid grid-cols-2 gap-3 mb-8"></div>

  <!-- BUTTON -->
  <button onclick="tunedOn()" class="w-full py-4 bg-orange-500 text-black font-bold text-xl rounded-xl">
    Tuned On
  </button>

</div>

<script>

const monitors = ["International","Grand Public","Niche","Public Ciblé","Fans"];
const phases = ["Upload","Monitor","Analyse","Chute","Recyclage","Email","Amélioration","Retour"];

let score = 72;
let coins = 148;
let tuned = 1200;
let version = 1;
let phase = 0;
let selected = 0;

const monitorDiv = document.getElementById("monitors");
const flowDiv = document.getElementById("flow");

function renderMonitors(){
  monitorDiv.innerHTML="";
  monitors.forEach((m,i)=>{
    let btn=document.createElement("div");
    btn.innerText=m;
    btn.className = "p-3 border rounded cursor-pointer " + (i===selected?"bg-orange-500 text-black":"bg-white/5");
    btn.onclick=()=>{selected=i;update();renderMonitors();};
    monitorDiv.appendChild(btn);
  });
}

function renderFlow(){
  flowDiv.innerHTML="";
  phases.forEach((p,i)=>{
    let div=document.createElement("div");
    div.innerText=p;
    div.className="p-3 rounded " + (i===phase?"bg-orange-500 text-black":"bg-white/5");
    flowDiv.appendChild(div);
  });
}

function tunedOn(){
  tuned++;
  coins++;
  update();
}

function update(){
  document.getElementById("score").innerText=score;
  document.getElementById("coins").innerText=Math.floor(coins);
  document.getElementById("coins2").innerText=Math.floor(coins);
  document.getElementById("tuned").innerText=tuned;
  document.getElementById("version").innerText="Clip V"+version;
  document.getElementById("monitorName").innerText=monitors[selected];
  renderFlow();
}

setInterval(()=>{

  phase=(phase+1)%phases.length;

  if(phase===3){
    score=Math.max(0,score-20);
    coins+=1;
  }

  if(phase===6){
    score=Math.min(100,score+30);
    version=2;
    coins+=8;
  }

  if(phase===0){
    version=1;
    score=72;
  }

  update();

},2200);

renderMonitors();
update();

</script>

</body>
</html>
