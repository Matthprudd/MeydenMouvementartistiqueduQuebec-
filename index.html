<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meyden Monitor Final</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-black text-white">

<div class="max-w-6xl mx-auto p-6">

<h1 class="text-4xl font-black mb-6">
Meyden Monitor — Version Finale
</h1>

<!-- KPI TOP -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

<div class="p-4 bg-white/5 rounded-xl">
<div class="text-sm text-white/50">Score</div>
<div id="topScore" class="text-2xl font-bold text-green-400">78</div>
</div>

<div class="p-4 bg-white/5 rounded-xl">
<div class="text-sm text-white/50">Coins</div>
<div id="topCoins" class="text-2xl font-bold text-yellow-300">148</div>
</div>

<div class="p-4 bg-white/5 rounded-xl">
<div class="text-sm text-white/50">Tuned</div>
<div id="topTuned" class="text-2xl font-bold text-orange-400">1200</div>
</div>

<div class="p-4 bg-white/5 rounded-xl">
<div class="text-sm text-white/50">Monitor</div>
<div id="activeMonitorName" class="text-2xl font-bold">International</div>
</div>

</div>

<!-- 💥 WOW INVESTOR BLOCK -->
<div class="grid grid-cols-3 gap-4 mb-10">

<div class="p-4 bg-black/40 border border-white/10 rounded-xl">
<div class="text-white/50 text-sm">Revenu plateforme</div>
<div id="totalRevenue" class="text-3xl font-black text-green-400">$0</div>
</div>

<div class="p-4 bg-black/40 border border-white/10 rounded-xl">
<div class="text-white/50 text-sm">Provision</div>
<div id="totalProvision" class="text-3xl font-black text-yellow-300">$0</div>
</div>

<div class="p-4 bg-black/40 border border-white/10 rounded-xl">
<div class="text-white/50 text-sm">Valeur annuelle</div>
<div id="ecosystemValue" class="text-3xl font-black text-orange-400">$0</div>
</div>

</div>

<!-- CREATOR SIMULATION -->
<h2 class="text-2xl font-bold mb-3">Simulation Créateur</h2>
<div id="creatorSimulationGrid" class="grid gap-4 mb-8"></div>

<!-- PUBLIC SIMULATION -->
<h2 class="text-2xl font-bold mb-3">Simulation Public</h2>
<div id="publicSimulationGrid" class="grid gap-4 mb-10"></div>

<!-- CHART -->
<h2 class="text-2xl font-bold mb-3">Projection 24 mois</h2>
<canvas id="chart"></canvas>

</div>

<script>

let coins = 148;
let score = 78;
let tuned = 1200;

const creatorPlans = [
{ name:"Gratuit", price:0 },
{ name:"14.99$", price:14.99 },
{ name:"65.99$", price:65.99 }
];

const publicPlans = [
{ name:"Gratuit", price:0 },
{ name:"1.99$", price:1.99 }
];

let selectedCreator = 1;
let selectedPublic = 1;

/* ---------- SIMULATION RENDER ---------- */

function renderSimulation() {

const creatorGrid = document.getElementById("creatorSimulationGrid");
const publicGrid = document.getElementById("publicSimulationGrid");

creatorGrid.innerHTML = "";
publicGrid.innerHTML = "";

creatorPlans.forEach((p,i)=>{

creatorGrid.innerHTML += `
<div class="p-4 border rounded-xl ${i===selectedCreator?'border-orange-400':'border-white/10'}">
<div class="font-bold">${p.name}</div>
<div class="text-green-400">${p.price}$ / mois</div>
<div>Annuel : ${(p.price*12).toFixed(2)}$</div>
<div>Provision : ${((p.price*12)/3).toFixed(2)}$</div>
</div>
`;

});

publicPlans.forEach((p,i)=>{

publicGrid.innerHTML += `
<div class="p-4 border rounded-xl ${i===selectedPublic?'border-orange-400':'border-white/10'}">
<div class="font-bold">${p.name}</div>
<div class="text-green-400">${p.price}$ / mois</div>
<div>Annuel : ${(p.price*12).toFixed(2)}$</div>
<div>Provision : ${((p.price*12)/3).toFixed(2)}$</div>
</div>
`;

});

}

/* ---------- GLOBAL CALCUL ---------- */

function updateGlobalStats(){

const creatorRevenue = creatorPlans[selectedCreator].price * 1000;
const publicRevenue = publicPlans[selectedPublic].price * 3000;

const total = creatorRevenue + publicRevenue;
const provision = total / 3;
const ecosystem = total * 12;

document.getElementById("totalRevenue").textContent = total.toFixed(0)+"$";
document.getElementById("totalProvision").textContent = provision.toFixed(0)+"$";
document.getElementById("ecosystemValue").textContent = ecosystem.toFixed(0)+"$";

}

/* ---------- CHART ---------- */

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["1","6","12","18","24"],
datasets:[
{
label:"Revenue",
data:[1000,5000,12000,18000,30000],
borderColor:"orange"
},
{
label:"Profit",
data:[500,3000,8000,12000,20000],
borderColor:"green"
}
]
}
});

/* ---------- LIVE EFFECT ---------- */

setInterval(()=>{
coins += 1;
score += 0.1;
tuned += 5;

document.getElementById("topCoins").textContent = Math.floor(coins);
document.getElementById("topScore").textContent = Math.floor(score);
document.getElementById("topTuned").textContent = tuned;

updateGlobalStats();

},2000);

/* INIT */

renderSimulation();
updateGlobalStats();

</script>

</body>
</html>
